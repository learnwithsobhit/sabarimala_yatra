services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: swamy
      POSTGRES_PASSWORD: swamy
      POSTGRES_DB: swamy_sharanam
    ports:
      - "5433:5432"
    volumes:
      - swamy_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swamy -d swamy_sharanam"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  swamy_pg:
