name: swamy_sharanam
description: Swamy Sharanam — Sabarimala yatra companion
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.3.0
  shared_preferences: ^2.5.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  image_picker: ^1.1.2
  video_player: ^2.9.2
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_animate: ^4.5.2
  pinput: ^6.0.2
  flutter_secure_storage: ^10.3.1
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  image_path: "assets/branding/ayyappa_app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/branding/ayyappa_app_icon.png"
    background_color: "#7A1F12"
    theme_color: "#C8811E"

# True cold-start splash (before Flutter engine loads) for Android/iOS/web.
flutter_native_splash:
  color: "#7A1F12"
  image: assets/branding/ayyappa_app_icon.png
  android: true
  ios: true
  web: true
  fullscreen: true
  android_12:
    color: "#7A1F12"
    image: assets/branding/ayyappa_app_icon.png
